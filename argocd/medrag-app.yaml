# ArgoCD Application(M8):声明"集群里应该跑什么"。
# ArgoCD 持续对比 git 里的 chart 与集群实际状态,漂移即自动纠正(GitOps)。
# 应用方式:kubectl apply -n argocd -f argocd/medrag-app.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: medrag
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Yihao23/med-rag-assistant.git
    targetRevision: master
    path: charts/medrag
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true # git 里删了的资源,集群里也删
      selfHeal: true # 有人手动改集群 → 自动改回 git 声明的状态
